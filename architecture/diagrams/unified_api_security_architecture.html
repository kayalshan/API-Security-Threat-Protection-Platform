<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unified API Security Threat Protection Platform — Architecture</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --surface: #141720;
    --border: #1e2330;
    --border-bright: #2a3045;
    --text-primary: #e8eaf0;
    --text-secondary: #8890a8;
    --text-muted: #4a5168;

    --purple-50: #EEEDFE; --purple-200: #AFA9EC; --purple-400: #7F77DD;
    --purple-600: #534AB7; --purple-800: #3C3489;

    --teal-50: #E1F5EE; --teal-200: #5DCAA5; --teal-400: #1D9E75;
    --teal-600: #0F6E56; --teal-800: #085041;

    --blue-50: #E6F1FB; --blue-200: #85B7EB; --blue-400: #378ADD;
    --blue-600: #185FA5; --blue-800: #0C447C;

    --coral-50: #FAECE7; --coral-200: #F0997B; --coral-400: #D85A30;
    --coral-600: #993C1D; --coral-800: #712B13;

    --amber-50: #FAEEDA; --amber-200: #EF9F27; --amber-400: #BA7517;
    --amber-600: #854F0B; --amber-800: #633806;

    --green-50: #EAF3DE; --green-200: #97C459; --green-400: #639922;
    --green-600: #3B6D11; --green-800: #27500A;

    --red-50: #FCEBEB; --red-200: #F09595; --red-400: #E24B4A;
    --red-600: #A32D2D; --red-800: #791F1F;

    --gray-50: #F1EFE8; --gray-200: #B4B2A9; --gray-400: #888780;
    --gray-600: #5F5E5A; --gray-800: #444441;
  }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 40px 24px 60px;
  }

  header {
    max-width: 860px;
    margin: 0 auto 40px;
    border-bottom: 1px solid var(--border-bright);
    padding-bottom: 24px;
  }

  .badge {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--teal-400);
    border: 1px solid var(--teal-800);
    background: rgba(29,158,117,0.07);
    padding: 3px 10px;
    border-radius: 4px;
    margin-bottom: 14px;
  }

  h1 {
    font-size: 26px;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.25;
    margin-bottom: 8px;
  }

  .subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-secondary);
    letter-spacing: 0.04em;
  }

  .diagram-card {
    max-width: 860px;
    margin: 0 auto;
    background: var(--surface);
    border: 1px solid var(--border-bright);
    border-radius: 16px;
    overflow: hidden;
  }

  .diagram-card svg {
    display: block;
    width: 100%;
    padding: 32px 24px;
  }

  /* SVG node styles for dark theme */
  .node { cursor: default; }
  .arr { stroke: var(--text-muted); fill: none; stroke-width: 1.5; }

  footer {
    max-width: 860px;
    margin: 28px auto 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }

  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }
</style>
</head>
